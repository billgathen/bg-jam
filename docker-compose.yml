services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bgjam
      POSTGRES_PASSWORD: bgjam
      POSTGRES_DB: bgjam
    ports:
      - "5432:5432"
    volumes:
      - bgjam_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgjam"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    env_file: ./frontend/.env
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  bgjam_db_data:
